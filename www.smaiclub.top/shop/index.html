<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAICLUB | 购买会员</title>
    <script src="https://login.smaiclub.top/common-auth.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        :root {
            --bg-light: #f4efe8;
            --text-light: #221f1a;
            --text-secondary: #5f584f;
            --glass-bg: rgba(255, 250, 244, 0.78);
            --glass-border: rgba(96, 69, 35, 0.12);
            --glass-shadow: 0 12px 36px rgba(92, 66, 31, 0.08);
            --accent-color: #1f5b53;
            --accent-hover: #174840;
            --accent-soft: rgba(31, 91, 83, 0.1);
            --gold: #b98748;
            --gold-soft: rgba(185, 135, 72, 0.12);
            --danger: #c95745;
            --surface: #fffaf4;
            --line: rgba(96, 69, 35, 0.14);
            --btn-gradient: linear-gradient(135deg, #1f5b53 0%, #b98748 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Manrope", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(31, 91, 83, 0.09) 0%, transparent 28%),
                radial-gradient(circle at 85% 10%, rgba(185, 135, 72, 0.12) 0%, transparent 24%),
                var(--bg-light);
            color: var(--text-light);
            overflow-x: hidden;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(70, 55, 35, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(70, 55, 35, 0.03) 1px, transparent 1px);
            background-size: 72px 72px;
            pointer-events: none;
            z-index: -1;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 15px 22px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            position: fixed;
            width: 92%;
            max-width: 1300px;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            border-radius: 50px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }

        .logo {
            font-family: "Cormorant Garamond", serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: #1b1713;
            text-transform: uppercase;
            text-decoration: none;
            white-space: nowrap;
        }

        .nav-links {
            display: flex;
            list-style: none;
            align-items: center;
            flex-grow: 1;
            justify-content: center;
            flex-wrap: wrap;
        }

        .nav-links li {
            margin: 0 5px;
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.93rem;
            padding: 10px 18px;
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover {
            background: var(--accent-soft);
        }

        .auth-container {
            min-width: 156px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .auth-container .smai-auth-wrapper {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            position: relative;
        }

        .page-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 128px 20px 40px;
        }

        .section-header {
            text-align: center;
            margin-bottom: 50px;
            padding: 38px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            box-shadow: var(--glass-shadow);
        }

        .section-header h1 {
            font-family: "Cormorant Garamond", serif;
            font-size: 3.8rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 0.02em;
        }

        .section-header p {
            font-size: 1.12rem;
            color: var(--text-secondary);
        }

        .steps {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .step {
            display: flex;
            align-items: center;
            opacity: 0.5;
            transition: opacity 0.3s;
        }
        .step.active {
            opacity: 1;
            font-weight: 600;
        }
        .step-number {
            width: 28px;
            height: 28px;
            background: var(--btn-gradient);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 8px;
            font-size: 14px;
        }
        .step-divider {
            width: 60px;
            height: 2px;
            background: rgba(96, 69, 35, 0.18);
            margin: 0 15px;
        }

        .tier-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .tier-card {
            background: var(--glass-bg);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
        }

        .tier-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 18px 40px rgba(92, 66, 31, 0.12);
        }

        .tier-card.selected {
            border-color: var(--gold);
            background: linear-gradient(180deg, rgba(255, 250, 244, 0.96), rgba(255, 247, 237, 0.92));
        }

        .tier-card.selected::after {
            content: '✓';
            position: absolute;
            top: 20px;
            right: 20px;
            color: var(--gold);
            font-size: 24px;
            font-weight: bold;
        }

        .tier-name {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .tier-price {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--text-light);
        }

        .tier-price span {
            font-size: 16px;
            font-weight: 400;
            color: var(--text-secondary);
        }

        .form-container {
            background: var(--glass-bg);
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--glass-shadow);
            border: 1px solid var(--glass-border);
            display: none; /* 默认隐藏，选完套餐后显示 */
        }

        .form-container.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-section-title {
            font-size: 21px;
            font-weight: 600;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(96, 69, 35, 0.12);
            padding-bottom: 15px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .full-width { grid-column: span 2; }

        .form-group {
            margin-bottom: 15px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.2s;
            outline: none;
            background: rgba(255, 255, 255, 0.78);
            color: var(--text-light);
        }

        input:focus, select:focus {
            border-color: var(--accent-color);
        }

        input.invalid {
            border-color: #ff453a;
            background: #fff2f2;
        }

        .error-msg {
            color: #ff453a;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        /* 支付方式 */
        .payment-methods {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .payment-method {
            flex: 1;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .payment-method.selected {
            border-color: var(--gold);
            background: var(--gold-soft);
            color: var(--accent-color);
            font-weight: 600;
        }

        .submit-btn {
            width: 100%;
            background: var(--btn-gradient);
            color: white;
            border: none;
            border-radius: 999px;
            padding: 18px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 30px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 8px 24px rgba(91, 68, 31, 0.22);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(91, 68, 31, 0.28);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .modal {
            background: var(--surface);
            width: 90%;
            max-width: 450px;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            border: 1px solid var(--glass-border);
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            color: #aaa;
            cursor: pointer;
            font-size: 20px;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .success-icon { font-size: 60px; color: #34c759; margin-bottom: 20px; }
        .error-icon { font-size: 60px; color: #ff453a; margin-bottom: 20px; }
        .info-icon { font-size: 60px; color: #0071e3; margin-bottom: 20px; }

        .key-display {
            background: rgba(255, 255, 255, 0.7);
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 18px;
            margin: 20px 0;
            border: 1px dashed rgba(96, 69, 35, 0.22);
            word-break: break-all;
            user-select: text;
        }

        .warning-text {
            color: #ff3b30;
            font-size: 13px;
            margin-top: 10px;
            font-weight: 500;
        }

        .confirm-btn {
            background: var(--btn-gradient);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 99px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }

        .modal-btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        .btn-cancel { background: rgba(96, 69, 35, 0.08); color: var(--text-light); }
        .btn-confirm { background: var(--btn-gradient); color: white; }

        .cursor-negative {
            position: fixed;
            top: 0;
            left: 0;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 2000;
            background: rgba(255, 255, 255, 0.92);
            mix-blend-mode: difference;
            transform: translate3d(-50%, -50%, 0) rotate(0deg) scaleX(1) scaleY(1);
            opacity: 0;
            transition: width 0.2s ease, height 0.2s ease, opacity 0.24s ease, box-shadow 0.24s ease;
            will-change: transform;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.35), 0 0 24px rgba(255, 255, 255, 0.12);
        }

        .cursor-negative.is-visible {
            opacity: 1;
        }

        .cursor-negative.is-active {
            width: 58px;
            height: 58px;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.42), 0 0 30px rgba(255, 255, 255, 0.18);
        }

        @media (max-width: 768px) {
            .navbar {
                width: 95%;
                padding: 15px 20px;
                flex-direction: column;
                gap: 15px;
                top: 10px;
            }

            .nav-links {
                justify-content: center;
                gap: 5px;
            }

            .nav-links li {
                margin: 0;
            }

            .nav-links a {
                padding: 8px 15px;
                font-size: 0.85rem;
            }

            .auth-container {
                width: 100%;
                justify-content: center;
            }

            .auth-container .smai-auth-wrapper {
                justify-content: center;
            }

            .section-header {
                padding: 28px 22px;
            }

            .section-header h1 {
                font-size: 2.8rem;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .full-width {
                grid-column: span 1;
            }

            .payment-methods {
                flex-direction: column;
            }
        }

        @media (pointer: coarse) {
            .cursor-negative {
                display: none;
            }
        }
    </style>
</head>
<body>
<div class="cursor-negative" id="cursorNegative" aria-hidden="true"></div>

<nav class="navbar">
    <a href="https://www.smaiclub.top" class="logo">SMAICLUB</a>
    <ul class="nav-links">
        <li><a href="https://www.smaiclub.top">首页</a></li>
        <li><a href="https://news.smaiclub.top">新闻</a></li>
        <li><a href="https://hall.smaiclub.top">展览馆</a></li>
    </ul>
    <div class="auth-container"></div>
</nav>

<div class="page-container">
    <div class="section-header">
        <h1>加入 SMAICLUB</h1>
        <p>开启您的精英生活方式</p>
    </div>

    <div class="steps">
        <div class="step active" id="step1">
            <div class="step-number">1</div> 选择会员
        </div>
        <div class="step-divider"></div>
        <div class="step" id="step2">
            <div class="step-number">2</div> 填写信息
        </div>
        <div class="step-divider"></div>
        <div class="step" id="step3">
            <div class="step-number">3</div> 完成购买
        </div>
    </div>

    <!-- 1. 会员选择 -->
    <div class="tier-grid" id="tier-selection">
        <div class="tier-card" onclick="selectTier('vip', 99999)">
            <div class="tier-name">精英会员</div>
            <div class="tier-price">¥99,999<span>/年</span></div>
            <p style="color:var(--text-secondary); font-size:14px">入门级精英体验，享受基础全球特权。</p>
        </div>
        <div class="tier-card" onclick="selectTier('svip1', 299999)">
            <div class="tier-name">尊享会员</div>
            <div class="tier-price">¥299,999<span>/年</span></div>
            <p style="color:var(--text-secondary); font-size:14px">进阶尊享，私人飞机与定制旅行。</p>
        </div>
        <div class="tier-card" onclick="selectTier('svip2', 999999)">
            <div class="tier-name">无限会员</div>
            <div class="tier-price">¥999,999<span>/年</span></div>
            <p style="color:var(--text-secondary); font-size:14px">顶级奢华，私人岛屿与全球顶级资源。</p>
        </div>
    </div>

    <!-- 2. 信息填写表单 -->
    <div class="form-container" id="info-form">
        <div class="form-section-title">个人信息</div>
        <div class="form-grid">
            <div class="form-group">
                <label>国家/地区</label>
                <select id="country" required onchange="validateField('country'); validateField('phone'); validateField('name');">
                    <option value="" disabled selected>请选择国家/地区</option>
                    <option value="China">中国 (China)</option>
                    <option value="Hong Kong">中国香港 (Hong Kong)</option>
                    <option value="Macau">中国澳门 (Macau)</option>
                    <option value="Taiwan">中国台湾 (Taiwan)</option>
                    <option value="USA">美国 (USA)</option>
                    <option value="UK">英国 (UK)</option>
                    <option value="Japan">日本 (Japan)</option>
                    <option value="Korea">韩国 (Korea)</option>
                    <option value="Singapore">新加坡 (Singapore)</option>
                    <option value="Canada">加拿大 (Canada)</option>
                    <option value="Australia">澳大利亚 (Australia)</option>
                    <option value="Germany">德国 (Germany)</option>
                    <option value="France">法国 (France)</option>
                    <option value="Other">其他 (Other)</option>
                </select>
                <div class="error-msg" id="error-country"></div>
            </div>

            <div class="form-group">
                <label>姓名</label>
                <input type="text" id="name" placeholder="真实姓名" required onblur="validateField('name')">
                <div class="error-msg" id="error-name"></div>
            </div>

            <div class="form-group">
                <label>手机号</label>
                <input type="tel" id="phone" placeholder="请输入手机号" required onblur="validateField('phone')">
                <div class="error-msg" id="error-phone"></div>
            </div>

            <div class="form-group">
                <label>电子邮箱</label>
                <input type="email" id="email" placeholder="example@smaiclub.top" required onblur="validateField('email')">
                <div class="error-msg" id="error-email"></div>
            </div>

            <div class="form-group">
                <label>省份/州</label>
                <input type="text" id="region" placeholder="省份/城市" required onblur="validateField('region')">
                <div class="error-msg" id="error-region"></div>
            </div>

            <div class="form-group">
                <label>邮政编码</label>
                <input type="text" id="zip" placeholder="邮编" required onblur="validateField('zip')">
                <div class="error-msg" id="error-zip"></div>
            </div>

            <div class="form-group full-width">
                <label>详细地址</label>
                <input type="text" id="address" placeholder="街道、门牌号" required>
                <!-- Add error div for consistency/safety -->
                <div class="error-msg" id="error-address"></div>
            </div>

             <!-- 银行卡号 (仅在选择银行卡时验证) -->
             <div class="form-group full-width" id="card-group" style="display:none;">
                <label>银行卡号</label>
                <input type="text" id="card-num" placeholder="16-19位卡号" onblur="validateField('card')">
                <div class="error-msg" id="error-card"></div>
            </div>
        </div>

        <div class="form-section-title" style="margin-top: 30px;">支付方式</div>
        <div class="payment-methods">
            <div class="payment-method" onclick="selectPayment(this, 'alipay')">
                <i class="fab fa-alipay" style="color:#1677FF;font-size:24px;"></i><br>支付宝
            </div>
            <div class="payment-method" onclick="selectPayment(this, 'wechat')">
                <i class="fab fa-weixin" style="color:#09BB07;font-size:24px;"></i><br>微信支付
            </div>
            <div class="payment-method" onclick="selectPayment(this, 'card')">
                <i class="fas fa-credit-card" style="color:#f9cb28;font-size:24px;"></i><br>银行卡
            </div>
        </div>

        <button class="submit-btn" onclick="processPurchase()">确认支付 <span id="pay-amount"></span></button>
    </div>
</div>

<!-- 成功弹窗 -->
<div class="modal-overlay" id="success-modal">
    <div class="modal">
        <div class="success-icon"><i class="fas fa-check-circle"></i></div>
        <h2>购买成功！</h2>
        <p style="color:var(--text-secondary); margin:10px 0;">欢迎加入 SMAICLUB。</p>

        <div style="text-align:left; margin-top:20px;">
            <p style="font-size:14px; font-weight:600;">设置会员许可证：</p>
            <p style="font-size:12px; color:#888;">这是您身份的唯一凭证。</p>
            <input type="text" id="new-license-input" placeholder="输入自定义密钥 (至少4位)" style="margin-top:10px;">
        </div>

        <button class="confirm-btn" onclick="preFinalizeLicense()">激活会员权益</button>
    </div>
</div>

<!-- 确认弹窗 -->
<div class="modal-overlay" id="confirm-modal">
    <div class="modal">
        <div class="info-icon"><i class="fas fa-question-circle"></i></div>
        <h2>确认密钥</h2>
        <p style="color:#666; margin:10px 0;">请确认您已牢记以下密钥，系统无法找回！</p>
        <div class="key-display" id="confirm-key-display"></div>

        <div class="modal-btn-group">
            <button class="modal-btn btn-cancel" onclick="closeModal('confirm-modal')">返回修改</button>
            <button class="modal-btn btn-confirm" onclick="doFinalizeLicense()">我已记下，继续</button>
        </div>
    </div>
</div>

<!-- 错误/提示弹窗 -->
<div class="modal-overlay" id="alert-modal">
    <div class="modal">
        <div class="modal-close" onclick="closeModal('alert-modal')">&times;</div>
        <div class="error-icon" id="alert-icon"><i class="fas fa-exclamation-circle"></i></div>
        <h2 id="alert-title">提示</h2>
        <p id="alert-msg" style="color:var(--text-secondary); margin:10px 0;">内容</p>
        <button class="confirm-btn" onclick="closeModal('alert-modal')">确定</button>
    </div>
</div>

<script>
    let selectedTier = null;
    let selectedPrice = 0;
    let selectedPaymentMethod = null;
    const cursorNegative = document.getElementById('cursorNegative');

    // 工具：显示模态框
    function showModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function showAlert(msg, title="提示", isError=true) {
        document.getElementById('alert-title').textContent = title;
        document.getElementById('alert-msg').textContent = msg;
        document.getElementById('alert-icon').innerHTML = isError ?
            '<i class="fas fa-times-circle" style="color:#ff453a"></i>' :
            '<i class="fas fa-info-circle" style="color:#0071e3"></i>';
        showModal('alert-modal');
    }

    // 页面加载时检查用户状态，防止降级选择
    const ROLE_LEVELS = { 'user': 0, 'vip': 1, 'svip1': 2, 'svip2': 3 };
    let currentUserLevel = 0;

    document.addEventListener('DOMContentLoaded', async () => {
        if (cursorNegative && window.matchMedia("(pointer: fine)").matches) {
            let cursorTargetX = window.innerWidth / 2;
            let cursorTargetY = window.innerHeight / 2;
            let cursorCurrentX = cursorTargetX;
            let cursorCurrentY = cursorTargetY;
            let cursorFrame = null;
            let cursorVelocityX = 0;
            let cursorVelocityY = 0;
            let cursorLastPointerX = cursorTargetX;
            let cursorLastPointerY = cursorTargetY;
            let cursorAngle = 0;

            const animateCursorNegative = () => {
                cursorCurrentX += (cursorTargetX - cursorCurrentX) * 0.18;
                cursorCurrentY += (cursorTargetY - cursorCurrentY) * 0.18;
                cursorVelocityX *= 0.84;
                cursorVelocityY *= 0.84;

                const dx = cursorTargetX - cursorCurrentX;
                const dy = cursorTargetY - cursorCurrentY;
                const distance = Math.hypot(dx, dy);
                const velocity = Math.hypot(cursorVelocityX, cursorVelocityY);
                if (velocity > 0.15) {
                    cursorAngle = Math.atan2(cursorVelocityY, cursorVelocityX) * (180 / Math.PI);
                } else if (distance > 0.5) {
                    cursorAngle = Math.atan2(dy, dx) * (180 / Math.PI);
                }

                const stretch = Math.min((velocity / 26) + (distance / 260), 0.18);
                const scaleX = 1 + stretch;
                const scaleY = 1 - stretch * 0.18;
                const dynamicOpacity = 0.82 + Math.min(distance / 220, 0.14);

                cursorNegative.style.left = `${cursorCurrentX}px`;
                cursorNegative.style.top = `${cursorCurrentY}px`;
                cursorNegative.style.transform = `translate3d(-50%, -50%, 0) rotate(${cursorAngle}deg) scaleX(${scaleX}) scaleY(${scaleY})`;
                cursorNegative.style.opacity = cursorNegative.classList.contains("is-visible") ? `${dynamicOpacity}` : "0";

                cursorFrame = window.requestAnimationFrame(animateCursorNegative);
            };

            window.addEventListener("mousemove", (event) => {
                cursorVelocityX += (event.clientX - cursorLastPointerX) * 0.16;
                cursorVelocityY += (event.clientY - cursorLastPointerY) * 0.16;
                cursorLastPointerX = event.clientX;
                cursorLastPointerY = event.clientY;
                cursorNegative.classList.add("is-visible");
                cursorTargetX = event.clientX;
                cursorTargetY = event.clientY;

                if (!cursorFrame) {
                    cursorFrame = window.requestAnimationFrame(animateCursorNegative);
                }
            });

            window.addEventListener("mousedown", () => {
                cursorNegative.classList.add("is-active");
            });

            window.addEventListener("mouseup", () => {
                cursorNegative.classList.remove("is-active");
            });

            document.addEventListener("mouseleave", () => {
                cursorNegative.classList.remove("is-visible");
            });
        }

        try {
            const res = await fetch('https://login.smaiclub.top/api/me', { credentials: 'include' });
            const data = await res.json();
            if (data.loggedIn) {
                currentUserLevel = ROLE_LEVELS[data.role] || 0;
                updateTierAvailability();
            }
        } catch (e) {
            console.error("Failed to fetch user status", e);
        }
    });

    function updateTierAvailability() {
        const tiers = [
            { id: 'vip', level: 1, el: document.querySelectorAll('.tier-card')[0] },
            { id: 'svip1', level: 2, el: document.querySelectorAll('.tier-card')[1] },
            { id: 'svip2', level: 3, el: document.querySelectorAll('.tier-card')[2] }
        ];

        tiers.forEach(t => {
            if (t.level <= currentUserLevel) {
                t.el.style.opacity = '0.5';
                t.el.style.cursor = 'not-allowed';
                t.el.style.pointerEvents = 'none'; // 禁止点击
                // 更改显示的文字提示
                const p = t.el.querySelector('p');
                if (p) p.innerHTML += '<br><strong style="color:#ff453a">(当前已拥有同级或更高级别)</strong>';
            }
        });
    }

    function selectTier(tier, price) {
        // 二次检查（防止通过控制台调用）
        const tierLevel = ROLE_LEVELS[tier] || 0;
        if (tierLevel <= currentUserLevel) {
            return showAlert("您当前已拥有同级或更高级别的会员权益，无需重复购买或降级。", "无法购买");
        }

        selectedTier = tier;
        selectedPrice = price;

        document.querySelectorAll('.tier-card').forEach(el => el.classList.remove('selected'));
        event.currentTarget.classList.add('selected');

        const form = document.getElementById('info-form');
        form.classList.add('active');
        document.getElementById('pay-amount').textContent = `¥${price.toLocaleString()}`;

        form.scrollIntoView({ behavior: 'smooth', block: 'start' });
        document.getElementById('step2').classList.add('active');
    }

    function selectPayment(el, method) {
        selectedPaymentMethod = method;
        document.querySelectorAll('.payment-method').forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');

        // 如果选择银行卡，显示卡号输入框
        const cardGroup = document.getElementById('card-group');
        if (method === 'card') {
            cardGroup.style.display = 'block';
            document.getElementById('card-num').setAttribute('required', 'true');
        } else {
            cardGroup.style.display = 'none';
            document.getElementById('card-num').removeAttribute('required');
        }
    }

    // --- 验证逻辑 ---
    const VALIDATION_RULES = {
        chineseRegions: ['China', 'Hong Kong', 'Macau', 'Taiwan'],
        nameCN: /^[\u4e00-\u9fa5]+$/, // 仅中文
        nameOther: /^[a-zA-Z\s]+$/,    // 仅字母和空格
        phoneCN: /^1[3-9]\d{9}$/,      // 中国手机号 11位
        phoneGeneral: /^\d{8,15}$/,    // 其他地区简单长度
        card: /^\d{16,19}$/,           // 银行卡 16-19位
        zipCN: /^\d{6}$/,              // 中国邮编 6位
        zipGeneral: /^\d{4,10}$/,      // 其他邮编
        email: /^[^\s@]+@[^\s@]+\.[^\s@]+$/
    };

    function validateField(field) {
        let elId = field;
        if (field === 'card') elId = 'card-num';

        const el = document.getElementById(elId);
        if (!el) return true; // Safety check

        const val = el.value.trim();
        const countryVal = document.getElementById('country').value;
        const errEl = document.getElementById('error-' + field);

        let isValid = true;
        let errMsg = "";

        // Determine context (is Chinese region?)
        const isChineseRegion = VALIDATION_RULES.chineseRegions.includes(countryVal);

        switch(field) {
            case 'country':
                if (!val || val === "") { isValid = false; errMsg = "请选择国家/地区"; }
                break;
            case 'name':
                if (isChineseRegion) {
                    if (!VALIDATION_RULES.nameCN.test(val)) { isValid = false; errMsg = "该地区姓名只能包含中文字符"; }
                } else {
                    if (!VALIDATION_RULES.nameOther.test(val)) { isValid = false; errMsg = "该地区姓名只能包含字母 (不能含数字/符号)"; }
                }
                break;
            case 'phone':
                if (isChineseRegion) {
                    let cleanVal = val.replace(/^\+86/, '').trim();
                    if (!VALIDATION_RULES.phoneCN.test(cleanVal)) { isValid = false; errMsg = "请输入有效的11位手机号"; }
                } else {
                    if (!VALIDATION_RULES.phoneGeneral.test(val.replace(/[^\d]/g, ''))) { isValid = false; errMsg = "手机号格式不正确"; }
                }
                break;
            case 'email':
                if (!VALIDATION_RULES.email.test(val)) { isValid = false; errMsg = "邮箱格式不正确"; }
                break;
            case 'zip':
                if (isChineseRegion) {
                    if (!VALIDATION_RULES.zipCN.test(val)) { isValid = false; errMsg = "请输入6位邮政编码"; }
                } else {
                    if (!VALIDATION_RULES.zipGeneral.test(val)) { isValid = false; errMsg = "邮政编码格式不正确"; }
                }
                break;
            case 'card':
                // 只有选择了银行卡支付才校验
                if (selectedPaymentMethod === 'card') {
                    if (!VALIDATION_RULES.card.test(val.replace(/\s/g, ''))) { isValid = false; errMsg = "请输入16-19位银行卡号"; }
                }
                break;
            case 'region':
                if (val.length < 2) { isValid = false; errMsg = "请输入有效地区"; }
                break;
        }

        if (!isValid) {
            el.classList.add('invalid');
            if (errEl) {
                errEl.textContent = errMsg;
                errEl.style.display = 'block';
            }
        } else {
            el.classList.remove('invalid');
            if (errEl) errEl.style.display = 'none';
        }
        return isValid;
    }

    async function processPurchase() {
        if (!selectedTier) return showAlert("请先选择会员等级");
        if (!selectedPaymentMethod) return showAlert("请选择支付方式");

        // 全字段校验
        const fields = ['country', 'name', 'phone', 'email', 'region', 'zip', 'address'];
        if (selectedPaymentMethod === 'card') fields.push('card');

        let allValid = true;
        fields.forEach(f => {
            if (!validateField(f)) {
                allValid = false;
            }
        });

        if (!allValid) return showAlert("请检查表单中红色的错误项", "表单错误");

        // 检查登录状态
        const authRes = await fetch('https://login.smaiclub.top/api/me', { credentials: 'include' });
        const authData = await authRes.json();

        if (!authData.loggedIn) {
            showAlert("请先登录账号", "未登录");
            setTimeout(() => window.location.href = "https://login.smaiclub.top", 1500);
            return;
        }

        const info = {};
        fields.forEach(f => {
            let elId = f;
            if (f === 'card') elId = 'card-num';
            info[f] = document.getElementById(elId).value.trim();
        });

        const btn = document.querySelector('.submit-btn');
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 正在处理支付...';

        try {
            const res = await fetch('https://login.smaiclub.top/api/buy', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({
                    tier: selectedTier,
                    personalInfo: info
                })
            });

            if (res.ok) {
                document.getElementById('step3').classList.add('active');
                showModal('success-modal');
            } else {
                const err = await res.json();
                showAlert("购买失败: " + (err.error || "未知错误"));
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        } catch (e) {
            showAlert("网络错误，请重试");
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
    }

    function preFinalizeLicense() {
        const key = document.getElementById('new-license-input').value.trim();
        if (!key || key.length < 4) {
            return showAlert("请输入至少4位的许可证密钥");
        }
        // 显示确认框
        document.getElementById('confirm-key-display').textContent = key;
        closeModal('success-modal');
        showModal('confirm-modal');
    }

    async function doFinalizeLicense() {
        const key = document.getElementById('confirm-key-display').textContent;

        try {
            const res = await fetch('https://login.smaiclub.top/api/set-license', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ licenseKey: key })
            });

            if (res.ok) {
                showAlert("激活成功！即将跳转回首页...", "成功", false);
                setTimeout(() => window.location.href = "https://www.smaiclub.top", 1500);
            } else {
                showAlert("设置失败，请重试");
                closeModal('confirm-modal');
                showModal('success-modal'); // 返回上一步
            }
        } catch (e) {
            showAlert("网络错误");
        }
    }
</script>
