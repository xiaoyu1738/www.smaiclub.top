<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通缉大厅 / SMAICLUB WANTED HALL</title>
    <script src="https://login.smaiclub.top/common-auth.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700;900&amp;family=Oswald:wght@500;700&amp;family=ZCOOL+XiaoWei&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>
<body>
    <main class="wanted-hall">
        <section class="hero" aria-labelledby="page-title">
            <p class="eyebrow">SMAICLUB PUBLIC ARCHIVE</p>
            <h1 id="page-title">通缉大厅</h1>
            <p class="hero-copy">所有在册对象将在此大厅列档展示。</p>
        </section>

        <section class="hall-board" aria-label="通缉档案总览">
            <div class="hall-metrics">
                <article>
                    <span>公开档案</span>
                    <strong>01</strong>
                </article>
                <article>
                    <span>大厅状态</span>
                    <strong>OPEN</strong>
                </article>
                <article>
                    <span>审理单位</span>
                    <strong>SMAICLUB</strong>
                </article>
            </div>

            <article class="wanted-card">
                <div class="case-number" aria-label="档案编号">CASE 001</div>

                <div class="portrait-wing">
                    <div class="portrait-frame">
                        <img src="image/lqx.png" alt="林秋霞通缉档案照片" class="suspect-image">
                    </div>
                    <p class="seal">WANTED</p>
                </div>

                <div class="profile-wing">
                    <p class="status">公开通缉档案</p>
                    <h2>林秋霞</h2>
                    <p class="charge-summary">体罚学生，修改课后体育活动，长期让学生做操锻炼。</p>

                    <dl class="info-grid">
                        <div>
                            <dt>年龄</dt>
                            <dd>未知</dd>
                        </div>
                        <div>
                            <dt>性别</dt>
                            <dd>女</dd>
                        </div>
                        <div>
                            <dt>最后已知位置</dt>
                            <dd>惠州，广东</dd>
                        </div>
                        <div>
                            <dt>悬赏单位</dt>
                            <dd>SMAICLUB 斯麦俱乐部反应试教育部门</dd>
                        </div>
                    </dl>

                    <div class="bounty-strip">
                        <span>赏金</span>
                        <strong>$100,000,000,000,000,000,000,000</strong>
                    </div>
                </div>
            </article>
        </section>
    </main>

    <footer>
        © 2026 SMAICLUB WANTED HALL
    </footer>
</body>
</html>
