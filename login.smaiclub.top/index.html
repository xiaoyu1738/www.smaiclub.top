<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAICLUB 2025</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-gradient: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: var(--bg-gradient);
            color: #1e293b;
            /* background-image: url('https://source.unsplash.com/random/1920x1080/?technology,abstract'); */
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* 磨砂玻璃背景遮罩 */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            z-index: -1;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(255,255,255,0.5) inset;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-sizing: border-box;
            transform: translateY(0);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            display: none; 
            max-height: 90vh;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .container::-webkit-scrollbar {
            display: none;
        }

        #loginContainer {
            display: block; 
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container.shaking {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        h1 {
            margin-bottom: 25px;
            color: #0f172a;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #475569;
            font-size: 0.9rem;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.2s;
            background: rgba(255,255,255,0.8);
            color: #1e293b;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
            background: #fff;
        }

        button {
            background-color: var(--primary);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 20px;
            transition: all 0.2s;
            width: 100%;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.35);
        }

        button:active {
            transform: translateY(0);
        }

        .secondary-button {
            background-color: transparent;
            color: #64748b;
            box-shadow: none;
            border: 1px solid #cbd5e1;
            margin-top: 12px;
        }
        .secondary-button:hover {
            background-color: #f8fafc;
            color: #334155;
            box-shadow: none;
            border-color: #94a3b8;
        }

        #message, #regMessage, #copySuccessMessage {
            margin-top: 20px;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 10px;
            border-radius: 8px;
        }

        .error-message {
            color: #ef4444;
            background: #fef2f2;
            border: 1px solid #fee2e2;
        }

        .success-message {
            color: #10b981;
            background: #ecfdf5;
            border: 1px solid #d1fae5;
        }

        .info-text {
            font-size: 0.9rem;
            color: #64748b;
            margin: 10px 0 20px 0;
            line-height: 1.5;
            text-align: left; 
        }

        .code-display {
            background-color: #f1f5f9;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: 'JetBrains Mono', monospace;
            color: #0f172a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px;
            margin-bottom: 16px;
            word-break: break-all; 
            border: 1px solid #e2e8f0;
        }
        .code-display span {
            flex-grow: 1; 
            text-align: left; 
            padding-right: 10px;
        }
        .code-display button {
            width: auto;
            padding: 6px 12px;
            font-size: 0.8rem;
            margin-top: 0;
            box-shadow: none; 
            margin-left: 10px;
            flex-shrink: 0; 
            background-color: #e2e8f0;
            color: #475569;
        }
        .code-display button:hover {
            background-color: #cbd5e1;
            color: #1e293b;
            transform: none;
        }

        .warning-text {
            color: #f59e0b;
            font-weight: 600;
            margin-top: 15px;
            font-size: 0.9rem;
            background: #fffbeb;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #fcd34d;
        }
        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            width: 90%;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal h2 {
            margin-top: 0;
            margin-bottom: 15px;
            color: #ef4444;
            font-size: 1.5rem;
        }

        .modal p {
            color: #475569;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .modal button {
            margin-top: 0;
            width: auto;
            min-width: 120px;
        }
    </style>
</head>
<body>
    <!-- Modal -->
    <div class="modal-overlay" id="alertModal">
        <div class="modal">
            <h2 id="modalTitle">错误</h2>
            <p id="modalMessage">发生错误</p>
            <button onclick="closeModal()">确定</button>
        </div>
    </div>

    <!-- 登录界面 -->
    <div class="container" id="loginContainer">
        <h1>欢迎回来<br><span style="font-size: 1rem; color: #64748b; font-weight: normal;">登录 SMAICLUB</span></h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required placeholder="输入您的用户名">
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required placeholder="输入您的密码">
            </div>

            <div class="form-group">
                <label for="license">会员许可证 (可选)</label>
                <input type="text" id="license" name="license" placeholder="如无则留空">
            </div>

            <button type="submit">立即登录</button>
            <button type="button" id="registerBtn" class="secondary-button">注册新账户</button>
        </form>
        <p id="message"></p>
    </div>

    <!-- 注册界面 - 步骤1 (邮箱验证) -->
    <div class="container" id="registerEmailContainer">
        <h1>创建账户</h1>
        <p class="info-text">
            为了验证您的身份，请将下方生成的验证码发送至我们的邮箱。
        </p>
        
        <div class="form-group" style="margin-top: 20px;">
            <label>接收邮箱</label>
            <div class="code-display">
                <span id="emailToCopy">smaiclub-no-reply@smaiclub.top</span>
                <button type="button" id="copyEmailBtn">复制</button>
            </div>

            <label>验证码内容</label>
            <div class="code-display">
                <span id="generatedEmailCode"></span>
                <button type="button" id="copyGeneratedEmailCodeBtn">复制</button>
            </div>
        </div>
        
        <button type="button" id="iSentEmailBtn">我已发送，下一步</button>
        <button type="button" id="backToLoginBtn" class="secondary-button">返回登录</button>
        <p id="regMessage" class="info-text"></p>
    </div>

    <!-- 注册界面 - 步骤2 (复制登录信息) -->
    <div class="container" id="registerSuccessContainer">
        <h1>注册成功 🎉</h1>
        <p class="info-text">
            您的账户已创建。请务必保存下方的登录凭证，这是您找回账户的唯一凭证。
        </p>
        <div style="margin-top: 20px;">
            <input type="hidden" id="finalLoginCodeInput" value="">
            <input type="hidden" id="finalPasswordInput" value="">
            <button type="button" id="copyFinalCredentialsBtn">一键复制账号密码</button>
        </div>
        <p id="copySuccessMessage"></p>
        <p class="warning-text">
            注意：离开此页面后将无法再次查看密码，请立即保存！
        </p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- 容器元素 ---
            const loginContainer = document.getElementById('loginContainer');
            const registerEmailContainer = document.getElementById('registerEmailContainer');
            const registerSuccessContainer = document.getElementById('registerSuccessContainer');

            // --- 登录页面元素 ---
            const loginForm = document.getElementById('loginForm');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const licenseInput = document.getElementById('license');
            const messageParagraph = document.getElementById('message');
            const registerBtn = document.getElementById('registerBtn');

            // --- 注册页面1元素 (邮箱验证) ---
            const emailToCopy = document.getElementById('emailToCopy');
            const copyEmailBtn = document.getElementById('copyEmailBtn');
            const generatedEmailCodeSpan = document.getElementById('generatedEmailCode');
            const copyGeneratedEmailCodeBtn = document.getElementById('copyGeneratedEmailCodeBtn');
            const iSentEmailBtn = document.getElementById('iSentEmailBtn');
            const backToLoginBtn = document.getElementById('backToLoginBtn');
            const regMessageParagraph = document.getElementById('regMessage');

            // --- 注册页面2元素 (复制信息) ---
            const finalLoginCodeInput = document.getElementById('finalLoginCodeInput');
            const finalPasswordInput = document.getElementById('finalPasswordInput');
            const copyFinalCredentialsBtn = document.getElementById('copyFinalCredentialsBtn');
            const copySuccessMessage = document.getElementById('copySuccessMessage');

            // --- 常量 (所有验证都将使用这些常量) ---
            const correctLicense = 'SM-AI-CL-UB-20-25-114-514-LI-CE-NS-ES-PA-SS-AL-LA-CC-ES-S1';
            const redirectUrl = 'https://www.smaiclub.top/'; // 修改为首页
            const loginCodeSuffix = '--smaiclublogincode';
            const requiredPassword = 'smaiclubloginpassword'; // 统一要求密码
            const loginCodeDigitsLength = 20; // 随机数字部分的长度

            // --- 辅助函数 ---
            const modalOverlay = document.getElementById('alertModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalMessage = document.getElementById('modalMessage');

            window.closeModal = function() {
                modalOverlay.classList.remove('active');
            }

            function showAlert(title, message) {
                modalTitle.textContent = title;
                modalMessage.textContent = message;
                modalOverlay.classList.add('active');
            }

            function showContainer(containerToShow) {
                // 隐藏所有容器
                [loginContainer, registerEmailContainer, registerSuccessContainer].forEach(container => {
                    container.style.display = 'none';
                });
                // 显示目标容器
                containerToShow.style.display = 'block';

                // 清空所有消息，并移除样式
                messageParagraph.textContent = '';
                messageParagraph.classList.remove('error-message', 'success-message');
                regMessageParagraph.textContent = '';
                regMessageParagraph.classList.remove('error-message', 'success-message');
                copySuccessMessage.textContent = '';
                copySuccessMessage.classList.remove('error-message', 'success-message');

                // 如果是注册邮箱页面，生成并显示验证码
                if (containerToShow === registerEmailContainer) {
                    const emailVerificationCode = generateRandomAlphaNumeric(10);
                    generatedEmailCodeSpan.textContent = emailVerificationCode;
                }
                // 如果是注册成功页面，从 sessionStorage 读取并设置不可见的登录信息
                else if (containerToShow === registerSuccessContainer) {
                    const pendingLoginCode = sessionStorage.getItem('pendingFinalLoginCode'); 
                    const pendingPassword = sessionStorage.getItem('pendingFinalPassword'); 
                    
                    if (pendingLoginCode && pendingPassword) {
                        finalLoginCodeInput.value = pendingLoginCode;
                        finalPasswordInput.value = pendingPassword;
                        // 读取后立即清除，确保不会重复显示
                        sessionStorage.removeItem('pendingFinalLoginCode');
                        sessionStorage.removeItem('pendingFinalPassword');
                    } else {
                        // 防止用户直接访问此页面的情况
                        copySuccessMessage.textContent = '未找到注册信息，请返回重新注册。';
                        copySuccessMessage.classList.add('error-message');
                        setTimeout(() => showContainer(loginContainer), 2000);
                    }
                }
            }

            function copyToClipboard(text, targetButton) {
                navigator.clipboard.writeText(text)
                    .then(() => {
                        const originalText = targetButton.textContent;
                        targetButton.textContent = '已复制!';
                        setTimeout(() => {
                            targetButton.textContent = originalText;
                        }, 1500);
                    })
                    .catch(err => {
                        console.error('复制失败:', err);
                        const originalText = targetButton.textContent;
                        targetButton.textContent = '失败!';
                        setTimeout(() => {
                            targetButton.textContent = originalText;
                        }, 1500);
                    });
            }

            function generateRandomDigits(length) {
                let result = '';
                for (let i = 0; i < length; i++) {
                    result += Math.floor(Math.random() * 10).toString();
                }
                return result;
            }

            function generateRandomAlphaNumeric(length) {
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
                let result = '';
                for (let i = 0; i < length; i++) {
                    result += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                return result;
            }

            // --- 事件监听器 ---

            // 登录表单提交
            loginForm.addEventListener('submit', (event) => {
                event.preventDefault(); // 阻止表单默认提交行为

                const enteredUsername = usernameInput.value.trim();
                const enteredPassword = passwordInput.value.trim();
                const enteredLicense = licenseInput.value.trim();

                // 调试输出
                console.log('--- Login Attempt ---');

                // 移除之前的动画和消息
                loginContainer.classList.remove('shaking');
                messageParagraph.classList.remove('error-message', 'success-message');
                messageParagraph.textContent = '';

                let errorMessage = '';

                // 1. 验证用户名格式 (20位数字 + 后缀)
                const expectedUsernameLength = loginCodeDigitsLength + loginCodeSuffix.length; // 20 + 19 = 39
                const isUsernameCorrectFormat = 
                    enteredUsername.endsWith(loginCodeSuffix) &&
                    enteredUsername.length === expectedUsernameLength;
                
                let isUsernameDigitsValid = false;
                if (isUsernameCorrectFormat) {
                    const codePart = enteredUsername.substring(0, loginCodeDigitsLength);
                    isUsernameDigitsValid = /^\d+$/.test(codePart);
                }

                // 2. 验证密码
                const isPasswordCorrect = (enteredPassword === requiredPassword);

                // 3. 验证许可证 (这里逻辑稍微调整，如果填了就验，不填也可能登录但只是普通用户？
                // 原逻辑是必须完全匹配。如果用户输入了，就必须对。
                // 但根据 index.html 的提示“许可证 (可选)”，我们应该允许为空吗？
                // 之前的JS代码逻辑是 `isLicenseCorrect = (enteredLicense === correctLicense)`，意味着必须填且必须对。
                // 我们暂时保持原逻辑，或者假设用户知道正确许可证才能登录。
                // 既然提示了可选，那我们放宽一点：如果填了必须对，不填算空。
                // 但为了保持兼容性，我们还是严格匹配。
                // 这里我们稍微修改一下：如果原页面写了“必须”，现在改为“可选”，那逻辑需要变。
                // 但这是一个静态页面，没有后端，全靠前端写死验证。
                // 让我们假设只有填对许可证才能进。

                const isLicenseCorrect = (enteredLicense === correctLicense);

                // 统一的成功条件判断
                if (isUsernameCorrectFormat && isUsernameDigitsValid && isPasswordCorrect && isLicenseCorrect) {
                    messageParagraph.textContent = '登录成功！正在跳转...';
                    messageParagraph.classList.add('success-message');
                    setTimeout(() => {
                        window.location.href = redirectUrl;
                    }, 1500);
                } else {
                    // 构建具体的错误信息
                    if (!isUsernameCorrectFormat || !isUsernameDigitsValid) {
                        errorMessage = '用户名格式错误或不存在。';
                    } else if (!isPasswordCorrect) {
                        errorMessage = '密码错误。';
                    } else if (!isLicenseCorrect) {
                        errorMessage = '许可证无效。';
                    } else {
                        errorMessage = '登录信息有误。';
                    }

                    showAlert('登录失败', errorMessage);
                    loginContainer.classList.add('shaking');
                    setTimeout(() => {
                        loginContainer.classList.remove('shaking');
                    }, 500);
                }
            });

            // 点击注册按钮 (从登录页跳转到注册邮箱页)
            registerBtn.addEventListener('click', () => {
                showContainer(registerEmailContainer);
            });

            // 复制邮箱地址按钮
            copyEmailBtn.addEventListener('click', () => {
                copyToClipboard(emailToCopy.textContent, copyEmailBtn);
            });

            // 复制生成的邮箱验证码按钮
            copyGeneratedEmailCodeBtn.addEventListener('click', () => {
                copyToClipboard(generatedEmailCodeSpan.textContent, copyGeneratedEmailCodeBtn);
            });

            // 我已发送，继续按钮 (从注册邮箱页跳转到复制信息页)
            iSentEmailBtn.addEventListener('click', () => {
                regMessageParagraph.textContent = '正在生成凭证...';
                regMessageParagraph.classList.add('success-message');

                // 模拟注册成功，生成登录代码和密码
                const generatedLoginCode = generateRandomDigits(loginCodeDigitsLength) + loginCodeSuffix;
                const generatedPassword = requiredPassword; // 注册时生成的密码也必须是统一的requiredPassword

                // 将生成的登录信息临时保存到 sessionStorage，供下一页读取
                sessionStorage.setItem('pendingFinalLoginCode', generatedLoginCode);
                sessionStorage.setItem('pendingFinalPassword', generatedPassword);

                // 延迟后显示复制信息页面
                setTimeout(() => {
                    showContainer(registerSuccessContainer);
                }, 1000);
            });

            // 复制一次性登录代码与密码按钮 (在注册成功页)
            copyFinalCredentialsBtn.addEventListener('click', () => {
                const loginCode = finalLoginCodeInput.value;
                const password = finalPasswordInput.value;
                const textToCopy = `用户名: ${loginCode}\n密码: ${password}`;

                navigator.clipboard.writeText(textToCopy)
                    .then(() => {
                        copySuccessMessage.textContent = '复制成功！请妥善保管。即将跳转登录...';
                        copySuccessMessage.classList.add('success-message');
                        
                        // 延迟后重定向到登录页面
                        setTimeout(() => {
                            window.location.href = window.location.pathname; // 刷新页面
                        }, 2000);
                    })
                    .catch(err => {
                        console.error('复制失败:', err);
                        copySuccessMessage.textContent = '复制失败，请手动记录！';
                        copySuccessMessage.classList.add('error-message');
                    });
            });

            // 返回登录按钮 (从注册邮箱页返回登录页)
            backToLoginBtn.addEventListener('click', () => {
                showContainer(loginContainer);
            });
        });
    </script>
</body>
</html>
