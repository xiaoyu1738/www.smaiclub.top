<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smai Club 控制中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://login.smaiclub.top/common-auth.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        body { font-family: 'SF Pro Display', sans-serif; background-color: #f5f5f7; color: #1d1d1f; }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }
        .sidebar-item {
            transition: all 0.2s ease;
        }
        .sidebar-item:hover, .sidebar-item.active {
            background: #e8e8ed;
            color: #0071e3;
        }
        .sidebar-item.active {
            font-weight: 600;
        }
    </style>
</head>
<body class="h-screen flex flex-col">
    <div id="root" class="flex-1 flex flex-col h-full"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState("profile"); // profile, billing, admin_logs, admin_users
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                // Initialize Common Auth
                if (window.CommonAuth) {
                    window.CommonAuth.init('auth-container');
                }

                // Fetch User Data
                fetch('https://login.smaiclub.top/api/me', { credentials: 'include' })
                    .then(res => res.json())
                    .then(data => {
                        if (data.loggedIn) {
                            setUser(data);
                        } else {
                            window.location.href = "https://login.smaiclub.top?redirect=" + encodeURIComponent(window.location.href);
                        }
                    })
                    .catch(err => console.error(err))
                    .finally(() => setLoading(false));
            }, []);

            if (loading) return (
                <div className="h-full flex items-center justify-center">
                    <i className="fas fa-spinner fa-spin text-3xl text-gray-400"></i>
                </div>
            );

            if (!user) return null;

            const isAdmin = ['admin', 'owner'].includes(user.effectiveRole);

            return (
                <div className="flex h-full max-w-7xl mx-auto w-full p-4 gap-6">
                    {/* Sidebar */}
                    <div className="w-64 flex-shrink-0 flex flex-col gap-2">
                        <div className="p-4 mb-4">
                            <h1 className="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-purple-600">
                                Smai Dash
                            </h1>
                            <p className="text-xs text-gray-500 mt-1">控制中心</p>
                        </div>
                        
                        <button 
                            onClick={() => setView('profile')}
                            className={`sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-sm ${view === 'profile' ? 'active' : 'text-gray-600'}`}
                        >
                            <i className="fas fa-user-circle w-5"></i> 个人资料
                        </button>
                        
                        <button 
                            onClick={() => setView('billing')}
                            className={`sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-sm ${view === 'billing' ? 'active' : 'text-gray-600'}`}
                        >
                            <i className="fas fa-credit-card w-5"></i> 订阅与账单
                        </button>

                        {isAdmin && (
                            <>
                                <div className="h-px bg-gray-200 my-2 mx-4"></div>
                                <div className="px-4 text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">管理工具</div>
                                <button 
                                    onClick={() => setView('admin_logs')}
                                    className={`sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-sm ${view === 'admin_logs' ? 'active' : 'text-gray-600'}`}
                                >
                                    <i className="fas fa-shield-alt w-5"></i> 系统日志
                                </button>
                                <button
                                    onClick={() => setView('admin_users')}
                                    className={`sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-sm ${view === 'admin_users' ? 'active' : 'text-gray-600'}`}
                                >
                                    <i className="fas fa-users-cog w-5"></i> 用户管理
                                </button>
                            </>
                        )}

                        <div className="mt-auto p-4">
                            <div id="auth-container"></div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 glass-card p-8 overflow-y-auto">
                        {view === 'profile' && <ProfileView user={user} />}
                        {view === 'billing' && <BillingView user={user} />}
                        {view === 'admin_logs' && isAdmin && <AdminLogsView user={user} />}
                        {view === 'admin_users' && isAdmin && <AdminUsersView user={user} />}
                    </div>
                </div>
            );
        }

        function ProfileView({ user }) {
            const isBanned = user.isBanned;
            const [avatarUrl, setAvatarUrl] = useState(user.avatarUrl || '');
            const [isEditingAvatar, setIsEditingAvatar] = useState(false);
            const [avatarInput, setAvatarInput] = useState(user.avatarUrl || '');
            const [avatarLoading, setAvatarLoading] = useState(false);
            const [avatarError, setAvatarError] = useState(null);

            const handleSaveAvatar = async () => {
                setAvatarLoading(true);
                setAvatarError(null);
                try {
                    const res = await fetch('https://login.smaiclub.top/api/set-avatar', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify({ avatarUrl: avatarInput.trim() })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        setAvatarUrl(data.avatarUrl || '');
                        setIsEditingAvatar(false);
                    } else {
                        setAvatarError(data.error || '保存失败');
                    }
                } catch (e) {
                    setAvatarError('网络错误');
                } finally {
                    setAvatarLoading(false);
                }
            };

            const handleClearAvatar = async () => {
                setAvatarInput('');
                setAvatarLoading(true);
                setAvatarError(null);
                try {
                    const res = await fetch('https://login.smaiclub.top/api/set-avatar', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify({ avatarUrl: '' })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        setAvatarUrl('');
                        setIsEditingAvatar(false);
                    } else {
                        setAvatarError(data.error || '清除失败');
                    }
                } catch (e) {
                    setAvatarError('网络错误');
                } finally {
                    setAvatarLoading(false);
                }
            };

            return (
                <div className="space-y-8 animate-[fadeIn_0.3s_ease-out]">
                    <div>
                        <h2 className="text-2xl font-bold mb-6">个人资料</h2>
                        <div className="flex items-center gap-6 mb-8">
                            <div className="relative group">
                                {avatarUrl ? (
                                    <img
                                        src={avatarUrl}
                                        alt="头像"
                                        className={`w-20 h-20 rounded-full object-cover shadow-lg ${isBanned ? 'grayscale' : ''}`}
                                        onError={(e) => {
                                            e.target.style.display = 'none';
                                            e.target.nextSibling.style.display = 'flex';
                                        }}
                                    />
                                ) : null}
                                <div
                                    className={`w-20 h-20 rounded-full flex items-center justify-center text-3xl text-white font-bold shadow-lg ${isBanned ? 'bg-gray-800' : 'bg-gradient-to-tr from-blue-400 to-purple-500'}`}
                                    style={{ display: avatarUrl ? 'none' : 'flex' }}
                                >
                                    {user.username.charAt(0).toUpperCase()}
                                </div>
                                <button
                                    onClick={() => { setIsEditingAvatar(true); setAvatarInput(avatarUrl); setAvatarError(null); }}
                                    className="absolute inset-0 bg-black/50 rounded-full opacity-0 group-hover:opacity-100 transition flex items-center justify-center text-white text-sm"
                                >
                                    <i className="fas fa-camera"></i>
                                </button>
                            </div>
                            <div>
                                <h3 className="text-xl font-semibold">{user.username}</h3>
                                <div className="flex items-center gap-2 mt-1">
                                    <span className={`px-2 py-0.5 rounded text-xs font-medium border ${
                                        isBanned ? 'bg-red-900 text-white border-red-900' :
                                        user.effectiveRole === 'owner' ? 'bg-black text-white border-black' :
                                        user.effectiveRole === 'admin' ? 'bg-red-100 text-red-600 border-red-200' :
                                        user.effectiveRole.startsWith('svip') ? 'bg-amber-100 text-amber-700 border-amber-200' :
                                        user.effectiveRole === 'vip' ? 'bg-blue-100 text-blue-600 border-blue-200' :
                                        'bg-gray-100 text-gray-600 border-gray-200'
                                    }`}>
                                        {isBanned ? 'BANNED' : user.effectiveRole.toUpperCase()}
                                    </span>
                                    {user.hasLicense && !isBanned && <span className="text-xs text-green-600 flex items-center gap-1"><i className="fas fa-check-circle"></i> 已认证</span>}
                                </div>
                            </div>
                        </div>

                        {/* 头像编辑弹窗 */}
                        {isEditingAvatar && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
                                <div className="bg-white rounded-xl p-6 w-full max-w-md shadow-2xl">
                                    <h3 className="text-lg font-bold mb-4">设置头像</h3>
                                    <p className="text-sm text-gray-500 mb-4">输入图片URL来设置您的头像</p>
                                    
                                    {avatarError && (
                                        <div className="bg-red-50 border border-red-200 text-red-600 px-3 py-2 rounded-lg text-sm mb-4">
                                            {avatarError}
                                        </div>
                                    )}
                                    
                                    <input
                                        type="url"
                                        value={avatarInput}
                                        onChange={(e) => setAvatarInput(e.target.value)}
                                        placeholder="https://example.com/avatar.jpg"
                                        className="w-full border border-gray-200 rounded-lg px-4 py-3 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    />
                                    
                                    {avatarInput && (
                                        <div className="mb-4 flex justify-center">
                                            <img
                                                src={avatarInput}
                                                alt="预览"
                                                className="w-24 h-24 rounded-full object-cover border-2 border-gray-200"
                                                onError={(e) => e.target.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="%23ddd" width="100" height="100"/><text x="50" y="55" text-anchor="middle" fill="%23999" font-size="14">加载失败</text></svg>'}
                                            />
                                        </div>
                                    )}
                                    
                                    <div className="flex gap-3">
                                        <button
                                            onClick={() => setIsEditingAvatar(false)}
                                            className="flex-1 py-2 bg-gray-100 rounded-lg text-gray-600 hover:bg-gray-200 transition"
                                            disabled={avatarLoading}
                                        >
                                            取消
                                        </button>
                                        {avatarUrl && (
                                            <button
                                                onClick={handleClearAvatar}
                                                className="py-2 px-4 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 transition"
                                                disabled={avatarLoading}
                                            >
                                                清除
                                            </button>
                                        )}
                                        <button
                                            onClick={handleSaveAvatar}
                                            className="flex-1 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition disabled:opacity-50"
                                            disabled={avatarLoading}
                                        >
                                            {avatarLoading ? '保存中...' : '保存'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="p-4 bg-white/50 rounded-xl border border-white/60">
                                <div className="text-xs text-gray-500 mb-1">账户状态</div>
                                <div className={`font-medium ${isBanned ? 'text-red-600' : 'text-green-600'}`}>
                                    {isBanned ? '已封禁' : '正常'}
                                </div>
                            </div>
                            <div className="p-4 bg-white/50 rounded-xl border border-white/60">
                                <div className="text-xs text-gray-500 mb-1">许可证状态</div>
                                <div className="font-medium">
                                    {isBanned ? '已冻结' : (user.hasLicense ? '已激活' : '未激活 / 待设置')}
                                </div>
                            </div>
                        </div>
                        
                        {isBanned && (
                            <div className="mt-6 p-4 bg-red-50 border border-red-200 rounded-xl text-red-800">
                                <div className="font-bold mb-2"><i className="fas fa-ban mr-2"></i> 您的账号已被封禁</div>
                                <div className="text-sm mb-4">
                                    封禁截止时间: {user.bannedUntil > 4000000000000 ? '永久' : new Date(user.bannedUntil).toLocaleString()}
                                </div>
                                <a href="https://chat.smaiclub.top" className="inline-block px-4 py-2 bg-red-600 text-white rounded-lg text-sm hover:bg-red-700 transition">
                                    前往申诉 (Emergency Room)
                                </a>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function BillingView({ user }) {
            const formatDate = (ts) => new Date(ts).toLocaleDateString();
            const displayRole = user.isExpired ? user.originalRole : user.role;

            return (
                <div className="space-y-8 animate-[fadeIn_0.3s_ease-out]">
                    <div>
                        <h2 className="text-2xl font-bold mb-6">订阅与账单</h2>
                        <div className="p-6 bg-gradient-to-br from-gray-900 to-gray-800 rounded-2xl text-white shadow-xl mb-8 relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-32 bg-white/5 rounded-full blur-3xl -mr-16 -mt-16"></div>
                            <div className="relative z-10">
                                <div className="text-sm text-gray-400 mb-1">
                                    {user.isExpired ? '已过期计划' : '当前计划'}
                                </div>
                                <h3 className="text-3xl font-bold mb-2">
                                    {user.isBanned ? 'BANNED' : displayRole.toUpperCase()} 计划
                                </h3>
                                
                                {user.isBanned ? (
                                    <div className="text-sm text-gray-300 mb-6">
                                        封禁至: {user.bannedUntil > 4000000000000 ? '永久' : formatDate(user.bannedUntil)}
                                    </div>
                                ) : (
                                    user.expireTime && (
                                        <div className="text-sm text-gray-300 mb-6">
                                            {user.isExpired ? '已于 ' : '有效期至 '}
                                            {formatDate(user.expireTime)}
                                            {user.isExpired && <span className="text-red-400 ml-2 font-bold">(已失效)</span>}
                                        </div>
                                    )
                                )}
                                
                                <div className="flex gap-4">
                                    {user.isBanned ? (
                                        <a href="https://chat.smaiclub.top" className="px-4 py-2 bg-red-600 text-white rounded-lg text-sm font-medium hover:bg-red-700 transition">
                                            去申诉
                                        </a>
                                    ) : (
                                        <a href="https://www.smaiclub.top/shop/" className="px-4 py-2 bg-white text-black rounded-lg text-sm font-medium hover:bg-gray-100 transition">
                                            {user.isExpired ? '重新订阅' : '升级 / 续费'}
                                        </a>
                                    )}
                                </div>
                            </div>
                        </div>

                        <h3 className="text-lg font-bold mb-4">账单历史</h3>
                        <div className="bg-white/50 rounded-xl border border-white/60 overflow-hidden">
                            <table className="w-full text-sm text-left">
                                <thead className="bg-gray-50/50 text-gray-500">
                                    <tr>
                                        <th className="px-6 py-3 font-medium">日期</th>
                                        <th className="px-6 py-3 font-medium">项目</th>
                                        <th className="px-6 py-3 font-medium">金额</th>
                                        <th className="px-6 py-3 font-medium">状态</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-100">
                                    {user.lastPurchase ? (
                                        <tr>
                                            <td className="px-6 py-4">{formatDate(user.lastPurchase)}</td>
                                            <td className="px-6 py-4">
                                                {displayRole.toUpperCase()} 会员 (1年)
                                            </td>
                                            <td className="px-6 py-4">
                                                {displayRole === 'svip2' ? '$50,000' : displayRole === 'svip1' ? '$15,000' : '$5,000'}
                                            </td>
                                            <td className="px-6 py-4">
                                                <span className="px-2 py-1 bg-green-100 text-green-700 rounded text-xs">已支付</span>
                                            </td>
                                        </tr>
                                    ) : (
                                        <tr>
                                            <td className="px-6 py-4 text-gray-500" colSpan="4">暂无账单记录</td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        function AdminLogsView({ user }) {
            const [logs, setLogs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [filter, setFilter] = useState('');
            const [total, setTotal] = useState(0);
            const [page, setPage] = useState(0);
            const limit = 50;

            const fetchLogs = async () => {
                setLoading(true);
                setError(null);
                try {
                    let url = `https://chat.smaiclub.top/api/admin/logs?limit=${limit}&offset=${page * limit}`;
                    if (filter) url += `&type=${filter}`;
                    
                    const res = await fetch(url, { credentials: 'include' });
                    const data = await res.json();
                    
                    if (!res.ok) {
                        throw new Error(data.message || data.error || 'Failed to fetch logs');
                    }
                    
                    setLogs(data.logs || []);
                    setTotal(data.total || 0);
                } catch (e) {
                    setError(e.message);
                    setLogs([]);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchLogs();
            }, [filter, page]);

            const eventTypes = ['', 'login', 'register', 'create_room', 'delete_room', 'message', 'ownership_transfer'];
            const eventTypeLabels = {
                '': '全部',
                'login': '登录',
                'register': '注册',
                'create_room': '创建房间',
                'delete_room': '删除房间',
                'message': '消息',
                'ownership_transfer': '所有权转移'
            };

            const formatDetails = (details) => {
                if (!details) return '-';
                if (details.error) return details.error;
                try {
                    return JSON.stringify(details, null, 2);
                } catch {
                    return String(details);
                }
            };

            return (
                <div className="space-y-6 animate-[fadeIn_0.3s_ease-out] h-full flex flex-col">
                    <div className="flex justify-between items-center flex-wrap gap-4">
                        <h2 className="text-2xl font-bold">系统活动日志</h2>
                        <div className="flex items-center gap-3">
                            <select
                                value={filter}
                                onChange={(e) => { setFilter(e.target.value); setPage(0); }}
                                className="px-3 py-1.5 text-sm bg-white border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                            >
                                {eventTypes.map(type => (
                                    <option key={type} value={type}>{eventTypeLabels[type]}</option>
                                ))}
                            </select>
                            <button
                                onClick={fetchLogs}
                                className="px-3 py-1.5 text-sm bg-white border border-gray-200 rounded-lg hover:bg-gray-50 transition"
                            >
                                <i className="fas fa-sync-alt mr-1"></i> 刷新
                            </button>
                        </div>
                    </div>

                    {error && (
                        <div className="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg text-sm">
                            <i className="fas fa-exclamation-circle mr-2"></i>{error}
                        </div>
                    )}

                    <div className="flex-1 bg-gray-900 rounded-xl overflow-hidden border border-gray-700 flex flex-col shadow-inner">
                        <div className="bg-gray-800 px-4 py-2 border-b border-gray-700 flex text-xs text-gray-400 font-mono">
                            <div className="w-40">时间</div>
                            <div className="w-28">类型</div>
                            <div className="w-32">用户</div>
                            <div className="w-28">IP</div>
                            <div className="flex-1">详情</div>
                        </div>
                        <div className="flex-1 overflow-y-auto font-mono text-xs text-gray-300">
                            {loading ? (
                                <div className="text-center py-10 text-gray-500">
                                    <i className="fas fa-spinner fa-spin text-xl mb-2"></i>
                                    <p>加载日志中...</p>
                                </div>
                            ) : logs.length === 0 ? (
                                <div className="text-center py-10 text-gray-600 opacity-50">
                                    <i className="fas fa-terminal text-2xl mb-2"></i>
                                    <p>暂无日志记录</p>
                                </div>
                            ) : (
                                logs.map((log, i) => (
                                    <div key={log.id || i} className="flex hover:bg-white/5 px-4 py-2 border-b border-gray-800/50">
                                        <div className="w-40 opacity-60">{new Date(log.created_at).toLocaleString()}</div>
                                        <div className={`w-28 font-bold ${
                                            log.event_type === 'login' ? 'text-green-400' :
                                            log.event_type === 'message' ? 'text-blue-400' :
                                            log.event_type === 'create_room' ? 'text-purple-400' :
                                            log.event_type === 'delete_room' ? 'text-red-400' :
                                            log.event_type === 'ownership_transfer' ? 'text-yellow-400' :
                                            'text-gray-400'
                                        }`}>{log.event_type}</div>
                                        <div className="w-32 text-yellow-200/80 truncate" title={log.user_id}>{log.user_id || '-'}</div>
                                        <div className="w-28 text-gray-500 truncate" title={log.ip_address}>{log.ip_address || '-'}</div>
                                        <div className="flex-1 break-all text-gray-400 whitespace-pre-wrap">{formatDetails(log.details)}</div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>

                    {/* Pagination */}
                    {total > limit && (
                        <div className="flex justify-between items-center text-sm text-gray-500">
                            <span>共 {total} 条记录</span>
                            <div className="flex gap-2">
                                <button
                                    onClick={() => setPage(p => Math.max(0, p - 1))}
                                    disabled={page === 0}
                                    className="px-3 py-1 bg-white border border-gray-200 rounded hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed"
                                >
                                    上一页
                                </button>
                                <span className="px-3 py-1">第 {page + 1} / {Math.ceil(total / limit)} 页</span>
                                <button
                                    onClick={() => setPage(p => p + 1)}
                                    disabled={(page + 1) * limit >= total}
                                    className="px-3 py-1 bg-white border border-gray-200 rounded hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed"
                                >
                                    下一页
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function AdminUsersView({ user }) {
            const [users, setUsers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [search, setSearch] = useState('');
            const [page, setPage] = useState(0);
            const [total, setTotal] = useState(0);
            const [editingUser, setEditingUser] = useState(null); // For role modal
            const [banningUser, setBanningUser] = useState(null); // For ban modal
            const [quickAdminUser, setQuickAdminUser] = useState(''); // Quick set admin input
            const limit = 50;

            const fetchUsers = async () => {
                setLoading(true);
                try {
                    let url = `https://login.smaiclub.top/api/admin/users?limit=${limit}&offset=${page * limit}`;
                    if (search) url += `&search=${search}`;
                    
                    const res = await fetch(url, { credentials: 'include' });
                    const data = await res.json();
                    
                    if (res.ok) {
                        setUsers(data.users || []);
                        setTotal(data.total || 0);
                    }
                } catch(e) {
                    console.error(e);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                const timer = setTimeout(fetchUsers, 300);
                return () => clearTimeout(timer);
            }, [search, page]);

            const handleSetRole = async (username, role) => {
                if (!confirm(`将用户 ${username} 的权限设置为 ${role}?`)) return;
                try {
                    const res = await fetch('https://login.smaiclub.top/api/admin/set-role', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        credentials: 'include',
                        body: JSON.stringify({ username, role })
                    });
                    if (res.ok) {
                        alert("设置成功");
                        fetchUsers();
                        setEditingUser(null);
                    } else {
                        const d = await res.json();
                        alert(d.error || "Failed");
                    }
                } catch(e) { alert("Error"); }
            };

            const handleBan = async (username, duration, unit, banIp, reason) => {
                try {
                    const res = await fetch('https://login.smaiclub.top/api/admin/ban', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        credentials: 'include',
                        body: JSON.stringify({ username, duration, unit, banIp, reason })
                    });
                    if (res.ok) {
                        alert("封禁成功");
                        fetchUsers();
                        setBanningUser(null);
                    } else {
                        const d = await res.json();
                        alert(d.error || "Failed");
                    }
                } catch(e) { alert("Error"); }
            };

            const handleUnban = async (username) => {
                if (!confirm(`解除用户 ${username} 的封禁?`)) return;
                try {
                    const res = await fetch('https://login.smaiclub.top/api/admin/unban', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        credentials: 'include',
                        body: JSON.stringify({ username })
                    });
                    if (res.ok) {
                        alert("解封成功");
                        fetchUsers();
                    } else {
                        const d = await res.json();
                        alert(d.error || "Failed");
                    }
                } catch(e) { alert("Error"); }
            };

            const handleDeleteUser = async (username) => {
                if (!confirm(`确定直接删除用户 ${username}？此操作不可恢复。`)) return;
                try {
                    const res = await fetch('https://login.smaiclub.top/api/admin/delete-user', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        credentials: 'include',
                        body: JSON.stringify({ username })
                    });
                    if (res.ok) {
                        alert("删除成功");
                        fetchUsers();
                    } else {
                        const d = await res.json();
                        alert(d.error || "删除失败");
                    }
                } catch (e) {
                    alert("网络错误");
                }
            };

            const handleQuickSetAdmin = async () => {
                if (!quickAdminUser) return;
                if (!confirm(`确定将用户 ${quickAdminUser} 提升为管理员 (admin)?`)) return;
                
                try {
                    const res = await fetch('https://login.smaiclub.top/api/admin/set-role', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        credentials: 'include',
                        body: JSON.stringify({ username: quickAdminUser, role: 'admin' })
                    });
                    if (res.ok) {
                        alert(`用户 ${quickAdminUser} 已成功设置为管理员`);
                        setQuickAdminUser('');
                        fetchUsers();
                    } else {
                        const d = await res.json();
                        alert(d.error || "设置失败");
                    }
                } catch(e) {
                    alert("网络错误");
                }
            };

            return (
                <div className="space-y-6 animate-[fadeIn_0.3s_ease-out] h-full flex flex-col">
                    {/* Owner Only: Quick Admin Tool */}
                    {user.role === 'owner' && (
                        <div className="bg-gradient-to-r from-blue-900 to-indigo-900 p-4 rounded-xl text-white shadow-lg flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="p-2 bg-white/10 rounded-lg">
                                    <i className="fas fa-user-shield text-xl"></i>
                                </div>
                                <div>
                                    <h3 className="font-bold text-sm">快速提权</h3>
                                    <p className="text-xs text-blue-200">直接输入用户名将其设置为管理员</p>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <input
                                    type="text"
                                    value={quickAdminUser}
                                    onChange={e => setQuickAdminUser(e.target.value)}
                                    placeholder="输入用户名"
                                    className="px-3 py-1.5 rounded-lg bg-black/30 border border-white/20 text-white placeholder-white/40 text-sm focus:outline-none focus:border-blue-400"
                                />
                                <button
                                    onClick={handleQuickSetAdmin}
                                    disabled={!quickAdminUser}
                                    className="px-3 py-1.5 bg-blue-500 hover:bg-blue-600 disabled:opacity-50 disabled:cursor-not-allowed rounded-lg text-sm font-medium transition"
                                >
                                    设为 Admin
                                </button>
                            </div>
                        </div>
                    )}

                    <div className="flex justify-between items-center flex-wrap gap-4">
                        <h2 className="text-2xl font-bold">用户管理</h2>
                        <div className="flex items-center gap-3">
                            <div className="relative">
                                <i className="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                <input
                                    type="text"
                                    placeholder="搜索用户..."
                                    value={search}
                                    onChange={e => setSearch(e.target.value)}
                                    className="pl-9 pr-4 py-1.5 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                />
                            </div>
                            <button
                                onClick={fetchUsers}
                                className="px-3 py-1.5 text-sm bg-white border border-gray-200 rounded-lg hover:bg-gray-50 transition"
                            >
                                <i className="fas fa-sync-alt mr-1"></i> 刷新
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 bg-white rounded-xl overflow-hidden border border-gray-200 flex flex-col shadow-sm">
                        <div className="bg-gray-50 px-6 py-3 border-b border-gray-200 flex text-xs font-bold text-gray-500 uppercase tracking-wider">
                            <div className="w-1/4">用户名</div>
                            <div className="w-1/4">角色</div>
                            <div className="w-1/4">状态</div>
                            <div className="w-1/4 text-right">操作</div>
                        </div>
                        <div className="flex-1 overflow-y-auto">
                            {loading ? (
                                <div className="text-center py-10 text-gray-500">
                                    <i className="fas fa-spinner fa-spin text-xl mb-2"></i>
                                    <p>加载中...</p>
                                </div>
                            ) : users.length === 0 ? (
                                <div className="text-center py-10 text-gray-500">
                                    暂无用户
                                </div>
                            ) : (
                                users.map(u => {
                                    const isBanned = u.banned_until && u.banned_until > Date.now();
                                    return (
                                        <div key={u.username} className="flex items-center px-6 py-4 border-b border-gray-100 hover:bg-gray-50 transition">
                                            <div className="w-1/4 font-medium">{u.username}</div>
                                            <div className="w-1/4">
                                                <span className={`px-2 py-0.5 rounded text-xs font-bold ${
                                                    u.role === 'owner' ? 'bg-black text-white' :
                                                    u.role === 'admin' ? 'bg-red-100 text-red-600' :
                                                    u.role.startsWith('svip') ? 'bg-amber-100 text-amber-700' :
                                                    u.role === 'vip' ? 'bg-blue-100 text-blue-600' :
                                                    'bg-gray-100 text-gray-600'
                                                }`}>
                                                    {u.role.toUpperCase()}
                                                </span>
                                            </div>
                                            <div className="w-1/4 text-sm">
                                                {isBanned ? (
                                                    <span className="text-red-600 font-bold">
                                                        <i className="fas fa-ban mr-1"></i>
                                                        {u.banned_until > 4000000000000 ? '永久封禁' : `封禁至 ${new Date(u.banned_until).toLocaleDateString()}`}
                                                    </span>
                                                ) : (
                                                    <span className="text-green-600"><i className="fas fa-check-circle mr-1"></i> 正常</span>
                                                )}
                                            </div>
                                            <div className="w-1/4 flex justify-end gap-2">
                                                {user.role === 'owner' && (
                                                    <button onClick={() => setEditingUser(u)} className="p-2 text-gray-500 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition" title="设置权限">
                                                        <i className="fas fa-user-cog"></i>
                                                    </button>
                                                )}
                                                {isBanned ? (
                                                    <button onClick={() => handleUnban(u.username)} className="p-2 text-gray-500 hover:text-green-600 hover:bg-green-50 rounded-lg transition" title="解封">
                                                        <i className="fas fa-unlock"></i>
                                                    </button>
                                                ) : (
                                                    <button onClick={() => setBanningUser(u)} className="p-2 text-gray-500 hover:text-red-600 hover:bg-red-50 rounded-lg transition" title="封禁">
                                                        <i className="fas fa-gavel"></i>
                                                    </button>
                                                )}
                                                {['admin', 'owner'].includes(user.role) && user.username !== u.username && (
                                                    <button onClick={() => handleDeleteUser(u.username)} className="p-2 text-gray-500 hover:text-red-700 hover:bg-red-100 rounded-lg transition" title="删除用户">
                                                        <i className="fas fa-trash"></i>
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })
                            )}
                        </div>
                    </div>

                    {/* Role Modal */}
                    {editingUser && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
                            <div className="bg-white rounded-xl p-6 w-full max-w-sm shadow-2xl">
                                <h3 className="text-lg font-bold mb-4">设置角色: {editingUser.username}</h3>
                                <div className="grid grid-cols-2 gap-2 mb-4">
                                    {['user', 'vip', 'svip1', 'svip2', 'admin', 'owner'].map(r => (
                                        <button key={r} onClick={() => handleSetRole(editingUser.username, r)} className="px-3 py-2 border rounded hover:bg-gray-50 text-sm">
                                            {r.toUpperCase()}
                                        </button>
                                    ))}
                                </div>
                                <button onClick={() => setEditingUser(null)} className="w-full py-2 bg-gray-100 rounded text-gray-600 hover:bg-gray-200">取消</button>
                            </div>
                        </div>
                    )}

                    {/* Ban Modal */}
                    {banningUser && (
                        <BanModal user={banningUser} onClose={() => setBanningUser(null)} onBan={handleBan} />
                    )}
                </div>
            );
        }

        function BanModal({ user, onClose, onBan }) {
            const [duration, setDuration] = useState(1);
            const [unit, setUnit] = useState('days');
            const [banIp, setBanIp] = useState(false);
            const [reason, setReason] = useState('');

            const handleSubmit = () => {
                onBan(user.username, duration, unit, banIp, reason);
            };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
                    <div className="bg-white rounded-xl p-6 w-full max-w-md shadow-2xl">
                        <h3 className="text-lg font-bold mb-4 text-red-600">封禁用户: {user.username}</h3>
                        
                        <div className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">封禁时长</label>
                                <div className="flex gap-2">
                                    <input type="number" min="1" value={duration} onChange={e => setDuration(e.target.value)} className="flex-1 border rounded px-3 py-2" disabled={unit === 'permanent'} />
                                    <select value={unit} onChange={e => setUnit(e.target.value)} className="border rounded px-3 py-2 bg-white">
                                        <option value="seconds">秒</option>
                                        <option value="minutes">分钟</option>
                                        <option value="hours">小时</option>
                                        <option value="days">天</option>
                                        <option value="months">月</option>
                                        <option value="years">年</option>
                                        <option value="permanent">永久</option>
                                    </select>
                                </div>
                            </div>

                            <div className="flex items-center gap-2">
                                <input type="checkbox" id="banIp" checked={banIp} onChange={e => setBanIp(e.target.checked)} />
                                <label htmlFor="banIp" className="text-sm text-gray-700">同时封禁 IP (如果可用)</label>
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">封禁原因</label>
                                <textarea value={reason} onChange={e => setReason(e.target.value)} className="w-full border rounded px-3 py-2 text-sm" rows="2" placeholder="可选..."></textarea>
                            </div>

                            <div className="flex gap-3 pt-2">
                                <button onClick={onClose} className="flex-1 py-2 bg-gray-100 rounded text-gray-600 hover:bg-gray-200">取消</button>
                                <button onClick={handleSubmit} className="flex-1 py-2 bg-red-600 text-white rounded hover:bg-red-700 font-medium">确认封禁</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
